name: Release Stable Version

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Stable release tag (e.g., 1.0.0)"
        required: true
        type: string
        pattern: "^\\d+\\.\\d+\\.\\d+$"

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check version matches Cargo.toml
        id: check
        run: |
          TAG="${{ github.event.inputs.tag }}"
          CARGO_VERSION=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)

          if [ "$CARGO_VERSION" != "$TAG" ]; then
            echo "Error: Tag version ($TAG) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

          echo "version=$TAG" >> $GITHUB_OUTPUT

  create-release:
    runs-on: ubuntu-latest
    needs: validate-version
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      tag: ${{ needs.validate-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Git Tag
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a "${{ needs.validate-version.outputs.version }}" -m "Release ${{ needs.validate-version.outputs.version }}" 2>/dev/null || true
          git push origin "${{ needs.validate-version.outputs.version }}" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Stable Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.validate-version.outputs.version }}
          name: Flash Desktop v${{ needs.validate-version.outputs.version }}
          draft: false
          prerelease: false

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: flash-desktop-macos-aarch64
            bundle_ext: dmg
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: flash-desktop-macos-x86_64
            bundle_ext: dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: flash-desktop-linux-x86_64
            bundle_ext: AppImage
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: flash-desktop-windows-x86_64
            bundle_ext: msi

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: "release-${{ matrix.target }}"
          cache-on-failure: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libsecret-1-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.create-release.outputs.tag }}
          releaseName: Flash Desktop v${{ needs.create-release.outputs.tag }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Find built artifact
        id: artifact
        shell: bash
        run: |
          if [[ "${{ matrix.bundle_ext }}" == "dmg" ]]; then
            FILE=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" | head -1)
          elif [[ "${{ matrix.bundle_ext }}" == "AppImage" ]]; then
            FILE=$(find src-tauri/target/${{ matrix.target }}/release/bundle/appimage -name "*.AppImage" | head -1)
          elif [[ "${{ matrix.bundle_ext }}" == "msi" ]]; then
            FILE=$(find src-tauri/target/${{ matrix.target }}/release/bundle/msi -name "*.msi" | head -1)
          fi
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "Found artifact: $FILE"

      - name: Generate checksums
        shell: bash
        run: |
          FILE="${{ steps.artifact.outputs.file }}"
          if [ -n "$FILE" ] && [ -f "$FILE" ]; then
            BASENAME=$(basename "$FILE")
            cp "$FILE" "${{ matrix.name }}.${{ matrix.bundle_ext }}"
            if command -v sha1sum &>/dev/null; then
              sha1sum "${{ matrix.name }}.${{ matrix.bundle_ext }}" > "${{ matrix.name }}.${{ matrix.bundle_ext }}.sha1"
            else
              shasum -a 1 "${{ matrix.name }}.${{ matrix.bundle_ext }}" > "${{ matrix.name }}.${{ matrix.bundle_ext }}.sha1"
            fi
            SHA=$(cut -d' ' -f1 < "${{ matrix.name }}.${{ matrix.bundle_ext }}.sha1")
            echo "{\"version\": \"${{ needs.create-release.outputs.tag }}\", \"sha1\": \"${SHA}\", \"platform\": \"${{ matrix.platform }}\", \"target\": \"${{ matrix.target }}\"}" > "${{ matrix.name }}.${{ matrix.bundle_ext }}.metadata.json"
          fi

      - name: Upload to R2
        if: steps.artifact.outputs.file != ''
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          ENDPOINT="https://87090cc9af569b84e7b50a7898dc0581.r2.cloudflarestorage.com"
          TAG="${{ needs.create-release.outputs.tag }}"
          NAME="${{ matrix.name }}.${{ matrix.bundle_ext }}"

          # Install AWS CLI if needed (macOS)
          if ! command -v aws &>/dev/null; then
            if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
              brew install awscli
            fi
          fi

          # Upload versioned
          aws s3 cp "$NAME" "s3://flash-cdn/desktop/releases/${NAME}.${TAG}" --endpoint-url "$ENDPOINT"
          aws s3 cp "${NAME}.metadata.json" "s3://flash-cdn/desktop/releases/${NAME}.${TAG}.metadata.json" --endpoint-url "$ENDPOINT"

          # Upload as stable (latest)
          aws s3 cp "$NAME" "s3://flash-cdn/desktop/releases/stable/${NAME}" --endpoint-url "$ENDPOINT"
          aws s3 cp "${NAME}.metadata.json" "s3://flash-cdn/desktop/releases/stable/${NAME}.metadata.json" --endpoint-url "$ENDPOINT"
