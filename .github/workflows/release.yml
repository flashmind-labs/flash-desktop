name: Release Stable Version

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Stable release tag (e.g., 1.0.0)"
        required: true
        type: string
        pattern: "^\\d+\\.\\d+\\.\\d+$"

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check version matches Cargo.toml
        id: check
        run: |
          TAG="${{ github.event.inputs.tag }}"
          CARGO_VERSION=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | cut -d'"' -f2)

          if [ "$CARGO_VERSION" != "$TAG" ]; then
            echo "Error: Tag version ($TAG) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

          echo "version=$TAG" >> $GITHUB_OUTPUT

  create-release:
    runs-on: ubuntu-latest
    needs: validate-version
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      tag: ${{ needs.validate-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Git Tag
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a "${{ needs.validate-version.outputs.version }}" -m "Release ${{ needs.validate-version.outputs.version }}" 2>/dev/null || true
          git push origin "${{ needs.validate-version.outputs.version }}" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Stable Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.validate-version.outputs.version }}
          name: Flash Desktop v${{ needs.validate-version.outputs.version }}
          draft: false
          prerelease: false

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: flash-desktop-macos-aarch64
            bundle_ext: dmg
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: flash-desktop-macos-x86_64
            bundle_ext: dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: flash-desktop-linux-x86_64
            bundle_ext: AppImage
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: flash-desktop-windows-x86_64
            bundle_ext: msi

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: "release-${{ matrix.target }}"
          cache-on-failure: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libsecret-1-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.create-release.outputs.tag }}
          releaseName: Flash Desktop v${{ needs.create-release.outputs.tag }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Find built artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR=""
          case "${{ matrix.bundle_ext }}" in
            dmg) BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg" ;;
            AppImage) BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/appimage" ;;
            msi) BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/msi" ;;
          esac

          echo "Scanning $BUNDLE_DIR for *.${{ matrix.bundle_ext }}"
          if [ ! -d "$BUNDLE_DIR" ]; then
            echo "::error::Bundle directory does not exist: $BUNDLE_DIR"
            ls -la "src-tauri/target/${{ matrix.target }}/release/bundle/" 2>/dev/null || true
            exit 1
          fi

          FILE=$(find "$BUNDLE_DIR" -name "*.${{ matrix.bundle_ext }}" | head -1)
          if [ -z "$FILE" ]; then
            echo "::error::No *.${{ matrix.bundle_ext }} found under $BUNDLE_DIR"
            ls -la "$BUNDLE_DIR"
            exit 1
          fi

          echo "Found artifact: $FILE ($(du -h "$FILE" | cut -f1))"
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          FILE="${{ steps.artifact.outputs.file }}"
          OUT="${{ matrix.name }}.${{ matrix.bundle_ext }}"
          cp "$FILE" "$OUT"
          if command -v sha1sum &>/dev/null; then
            sha1sum "$OUT" > "$OUT.sha1"
          else
            shasum -a 1 "$OUT" > "$OUT.sha1"
          fi
          SHA=$(cut -d' ' -f1 < "$OUT.sha1")
          printf '{"version":"%s","sha1":"%s","platform":"%s","target":"%s"}\n' \
            "${{ needs.create-release.outputs.tag }}" \
            "$SHA" \
            "${{ matrix.platform }}" \
            "${{ matrix.target }}" > "$OUT.metadata.json"
          echo "✓ $OUT prepared (sha1: $SHA)"

      - name: Install AWS CLI (macOS)
        if: matrix.platform == 'macos-latest' && steps.artifact.outputs.file != ''
        shell: bash
        run: |
          if ! command -v aws &>/dev/null; then
            brew install awscli
          fi
          aws --version

      - name: Install AWS CLI (Windows)
        if: matrix.platform == 'windows-latest' && steps.artifact.outputs.file != ''
        shell: pwsh
        run: |
          if (-not (Get-Command aws -ErrorAction SilentlyContinue)) {
            Invoke-WebRequest -Uri "https://awscli.amazonaws.com/AWSCLIV2.msi" -OutFile "$env:TEMP\AWSCLIV2.msi"
            Start-Process msiexec.exe -Wait -ArgumentList "/i $env:TEMP\AWSCLIV2.msi /quiet"
            $env:Path += ";C:\Program Files\Amazon\AWSCLIV2"
            "C:\Program Files\Amazon\AWSCLIV2" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          aws --version

      - name: Upload to R2
        if: steps.artifact.outputs.file != ''
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          set -euo pipefail
          ENDPOINT="https://87090cc9af569b84e7b50a7898dc0581.r2.cloudflarestorage.com"
          TAG="${{ needs.create-release.outputs.tag }}"
          NAME="${{ matrix.name }}.${{ matrix.bundle_ext }}"

          # Verify auth + bucket access first so we fail fast with a clear error
          echo "::group::Verifying R2 access"
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "::error::R2 credentials are not configured (R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY secrets missing)"
            exit 1
          fi
          aws s3 ls "s3://flash-cdn/" --endpoint-url "$ENDPOINT" >/dev/null
          echo "::endgroup::"

          if [ ! -f "$NAME" ]; then
            echo "::error::Expected artifact '$NAME' not found in working directory"
            ls -la
            exit 1
          fi

          echo "::group::Uploading $NAME ($(du -h "$NAME" | cut -f1)) to R2"
          # Versioned copy (immutable history)
          aws s3 cp "$NAME" "s3://flash-cdn/desktop/releases/${NAME}.${TAG}" --endpoint-url "$ENDPOINT"
          aws s3 cp "${NAME}.metadata.json" "s3://flash-cdn/desktop/releases/${NAME}.${TAG}.metadata.json" --endpoint-url "$ENDPOINT"
          # Stable (latest) — overwrites previous release
          aws s3 cp "$NAME" "s3://flash-cdn/desktop/releases/stable/${NAME}" --endpoint-url "$ENDPOINT"
          aws s3 cp "${NAME}.metadata.json" "s3://flash-cdn/desktop/releases/stable/${NAME}.metadata.json" --endpoint-url "$ENDPOINT"
          echo "::endgroup::"

          echo "::group::Verifying upload"
          aws s3 ls "s3://flash-cdn/desktop/releases/stable/${NAME}" --endpoint-url "$ENDPOINT"
          echo "::endgroup::"

          echo "✓ Uploaded ${NAME} to:"
          echo "  versioned: https://cdn.useflash.com/desktop/releases/${NAME}.${TAG}"
          echo "  stable:    https://cdn.useflash.com/desktop/releases/stable/${NAME}"
