<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flash</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      /* Outer chrome — matches the web app's dark sidebar */
      background: var(--bg-dark, #2e2c29);
    }

    /* Inner light card — wraps the loader/offline content with rounded
       corners and a small gap of dark chrome around it, exactly like the
       main chat area of useflash.com (m-[6px], rounded-2xl, bg-flash-chat). */
    .splash {
      position: fixed;
      top: 5px;
      right: 5px;
      bottom: 5px;
      left: 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg-chat);
      border-radius: 16px;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.18);
      z-index: 10;
      transition: opacity 0.3s ease;
    }
    .splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .logo-mark {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: 44px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .tagline {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: 13px;
      color: var(--text-muted);
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .offline {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      max-width: 320px;
      text-align: center;
    }
    .offline.show { display: flex; }
    .offline h2 {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
    }
    .offline p {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-muted);
      margin: 0;
    }
    .offline-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }
    .retry-btn {
      margin-top: 4px;
      padding: 10px 22px;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .retry-btn:hover { background: var(--primary-light); }
    .retry-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="splash" class="splash">
    <div id="loading-view" style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
      <div class="spinner"></div>
      <div class="tagline">Connecting…</div>
    </div>

    <div id="offline-view" class="offline">
      <div class="offline-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 1l22 22" />
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
          <line x1="12" y1="20" x2="12.01" y2="20" />
        </svg>
      </div>
      <h2>No connection</h2>
      <p>Flash needs an internet connection to reach your workspace. Check your network and try again.</p>
      <button id="retry-btn" class="retry-btn">Retry</button>
    </div>
  </div>

  <script>
    const DEFAULT_SERVER_URL = "https://useflash.com";

    const loadingView = document.getElementById("loading-view");
    const offlineView = document.getElementById("offline-view");
    const retryBtn = document.getElementById("retry-btn");

    function showLoading() {
      loadingView.style.display = "flex";
      offlineView.classList.remove("show");
    }

    function showOffline() {
      loadingView.style.display = "none";
      offlineView.classList.add("show");
    }

    async function tryConnect() {
      showLoading();

      let url = DEFAULT_SERVER_URL;
      try {
        if (window.__TAURI__?.core?.invoke) {
          const configured = await window.__TAURI__.core.invoke("get_server_url");
          if (configured && typeof configured === "string") url = configured;
        }
      } catch { /* ignore — use default */ }

      // Quick probe with a no-cors HEAD — doesn't give us status but it will
      // throw/abort if the host is unreachable. Good enough for an online check.
      try {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 5000);
        await fetch(url, { method: "HEAD", mode: "no-cors", signal: controller.signal });
        clearTimeout(timer);
        // Navigate the webview to Flash
        window.location.replace(url);
      } catch {
        showOffline();
      }
    }

    retryBtn.addEventListener("click", () => {
      retryBtn.disabled = true;
      tryConnect().finally(() => { retryBtn.disabled = false; });
    });

    // Auto-retry when the OS reports online again
    window.addEventListener("online", tryConnect);

    tryConnect();
  </script>
</body>
</html>
